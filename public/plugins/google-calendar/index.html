<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBridge Google Calendar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .container { width: 100%; max-width: 520px; }
    .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .error-msg { text-align: center; padding: 24px; color: #ff6b6b; font-size: 14px; }

    /* Event created card */
    .event-card {
      background: linear-gradient(135deg, #4285F4 0%, #3367D6 100%);
      border-radius: 12px; padding: 20px; text-align: center; color: #fff;
    }
    .event-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .event-meta { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
    .event-time { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .event-link {
      display: inline-block; background: #fff; color: #4285F4;
      padding: 8px 20px; border-radius: 20px; font-size: 13px;
      font-weight: 700; text-decoration: none;
    }

    /* Event list */
    .event-list { display: flex; flex-direction: column; gap: 8px; }
    .event-item {
      display: flex; align-items: center; gap: 12px;
      background: #f8f9fa; border-radius: 8px; padding: 12px;
      border-left: 4px solid #4285F4;
    }
    .event-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .event-info { flex: 1; min-width: 0; }
    .event-name { font-size: 14px; font-weight: 600; }
    .event-date { font-size: 12px; color: #666; margin-top: 2px; }

    .section-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
      color: #888; margin-bottom: 8px; font-weight: 600;
    }

    .empty-state {
      text-align: center; padding: 32px; color: #888; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Connecting to Google Calendar...</div>
  </div>

  <script>
    var pluginId = null;
    var conversationId = null;

    function sendMsg(type, payload) {
      parent.postMessage({
        type: type, conversationId: conversationId,
        pluginId: pluginId, payload: payload
      }, '*');
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function formatDateTime(isoStr) {
      if (!isoStr) return 'All day';
      try {
        var d = new Date(isoStr);
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
          ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      } catch (e) {
        return isoStr;
      }
    }

    function formatTimeRange(start, end) {
      if (!start) return 'All day';
      var s = formatDateTime(start);
      if (end) {
        try {
          var endTime = new Date(end).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          return s + ' - ' + endTime;
        } catch (e) {}
      }
      return s;
    }

    var EVENT_COLORS = ['#4285F4', '#EA4335', '#FBBC04', '#34A853', '#FF6D01', '#46BDC6', '#7B61FF'];

    function renderEvents(events, title) {
      var app = document.getElementById('app');
      if (!events || events.length === 0) {
        app.innerHTML = '<div class="empty-state">No upcoming events found.</div>';
        return;
      }
      var html = '<div class="section-title">' + escHtml(title || 'Upcoming Events') + '</div>';
      html += '<div class="event-list">';
      for (var i = 0; i < events.length; i++) {
        var ev = events[i];
        var color = EVENT_COLORS[i % EVENT_COLORS.length];
        html += '<div class="event-item" style="border-left-color:' + color + '">';
        html += '<div class="event-dot" style="background:' + color + '"></div>';
        html += '<div class="event-info">';
        html += '<div class="event-name">' + escHtml(ev.summary || 'Untitled') + '</div>';
        html += '<div class="event-date">' + formatTimeRange(ev.start, ev.end) + '</div>';
        if (ev.description) {
          html += '<div class="event-date" style="margin-top:2px">' + escHtml(ev.description) + '</div>';
        }
        html += '</div></div>';
      }
      html += '</div>';
      app.innerHTML = html;
    }

    function renderEventCreated(data) {
      var app = document.getElementById('app');
      app.innerHTML =
        '<div class="event-card">' +
          '<div class="event-title">' + escHtml(data.summary) + '</div>' +
          (data.description ? '<div class="event-meta">' + escHtml(data.description) + '</div>' : '') +
          '<div class="event-time">' + formatTimeRange(data.start, data.end) + '</div>' +
          (data.htmlLink ? '<a class="event-link" href="' + escHtml(data.htmlLink) + '" target="_blank">Open in Google Calendar</a>' : '') +
        '</div>';
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML =
        '<div class="error-msg">' + escHtml(msg) + '</div>';
    }

    function handleToolInvoke(payload) {
      var invocationId = payload.invocationId;
      var params = payload.params;

      switch (payload.toolName) {
        case 'list_events':
          handleListEvents(invocationId, params);
          break;
        case 'create_event':
          handleCreateEvent(invocationId, params);
          break;
        default:
          sendMsg('TOOL_RESULT', {
            invocationId: invocationId,
            error: 'Unknown tool: ' + payload.toolName
          });
      }
    }

    function handleListEvents(invocationId, params) {
      var data = params._calendarData;
      if (!data) {
        renderError(params._calendarError || 'Failed to load events');
        sendMsg('TOOL_RESULT', {
          invocationId: invocationId,
          error: params._calendarError || 'Failed to load events'
        });
        return;
      }

      renderEvents(data.events, 'Your Upcoming Events');
      sendMsg('TOOL_RESULT', {
        invocationId: invocationId,
        result: {
          events: data.events,
          count: data.events.length,
          message: data.events.length > 0
            ? 'Found ' + data.events.length + ' upcoming events.'
            : 'No upcoming events found.'
        }
      });
    }

    function handleCreateEvent(invocationId, params) {
      var data = params._calendarData;
      if (!data) {
        renderError(params._calendarError || 'Failed to create event');
        sendMsg('TOOL_RESULT', {
          invocationId: invocationId,
          error: params._calendarError || 'Failed to create event'
        });
        return;
      }

      renderEventCreated(data.event);
      sendMsg('TOOL_RESULT', {
        invocationId: invocationId,
        result: {
          eventId: data.event.id,
          summary: data.event.summary,
          start: data.event.start,
          end: data.event.end,
          htmlLink: data.event.htmlLink,
          message: 'Created event "' + data.event.summary + '".'
        }
      });
      sendMsg('PLUGIN_COMPLETE', {
        summary: 'Created calendar event "' + data.event.summary + '".'
      });
    }

    window.addEventListener('message', function(event) {
      var msg = event.data;
      if (!msg || typeof msg !== 'object' || msg.type !== 'TOOL_INVOKE') return;
      if (msg.pluginId) pluginId = msg.pluginId;
      if (msg.conversationId) conversationId = msg.conversationId;
      handleToolInvoke(msg.payload);
    });

    var urlParams = new URLSearchParams(window.location.search);
    pluginId = urlParams.get('pluginId') || 'google-calendar';
    conversationId = urlParams.get('conversationId') || 'unknown';
    sendMsg('PLUGIN_READY', {});
  </script>
</body>
</html>
