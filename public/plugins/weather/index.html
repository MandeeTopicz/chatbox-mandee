<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBridge Weather</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f9ff;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .container { width: 100%; max-width: 480px; }
    .loading { text-align: center; padding: 40px; color: #6b7280; font-size: 14px; }
    .error-msg { text-align: center; padding: 24px; color: #dc2626; font-size: 14px; }

    .weather-card {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      border-radius: 16px;
      padding: 24px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .weather-card::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .city-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .region { font-size: 12px; opacity: 0.8; font-weight: 500; }
    .period-label { font-size: 11px; opacity: 0.7; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .temp-row { display: flex; align-items: center; gap: 16px; margin: 16px 0; }
    .temp-value { font-size: 56px; font-weight: 700; line-height: 1; }
    .temp-unit { font-size: 24px; opacity: 0.7; }
    .weather-icon { width: 64px; height: 64px; border-radius: 8px; }
    .condition { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .detail { font-size: 12px; opacity: 0.85; line-height: 1.5; margin-bottom: 16px; }

    .details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .detail-item {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; margin-bottom: 4px; }
    .detail-value { font-size: 14px; font-weight: 700; }

    .source { margin-top: 12px; text-align: right; font-size: 10px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading" id="loadingMsg">Loading weather...</div>
  </div>

  <script>
    var pluginId = null;
    var conversationId = null;

    function sendMsg(type, payload) {
      parent.postMessage({
        type: type,
        conversationId: conversationId,
        pluginId: pluginId,
        payload: payload
      }, '*');
    }

    function renderWeather(data) {
      var app = document.getElementById('app');
      var iconHtml = data.icon
        ? '<img class="weather-icon" src="' + escHtml(data.icon) + '" alt="' + escHtml(data.description || '') + '">'
        : '';

      app.innerHTML =
        '<div class="weather-card">' +
          '<div class="city-name">' + escHtml(data.city) + '</div>' +
          '<div class="region">' + escHtml(data.region || data.country || '') + '</div>' +
          '<div class="period-label">' + escHtml(data.period || '') + '</div>' +
          '<div class="temp-row">' +
            iconHtml +
            '<div><span class="temp-value">' + data.temp + '</span><span class="temp-unit">&deg;' + escHtml(data.temp_unit || 'F') + '</span></div>' +
          '</div>' +
          '<div class="condition">' + escHtml(data.description || '') + '</div>' +
          (data.detail ? '<div class="detail">' + escHtml(data.detail) + '</div>' : '') +
          '<div class="details-grid">' +
            '<div class="detail-item">' +
              '<div class="detail-label">Wind</div>' +
              '<div class="detail-value">' + escHtml(data.wind_speed || '') + ' ' + escHtml(data.wind_direction || '') + '</div>' +
            '</div>' +
            '<div class="detail-item">' +
              '<div class="detail-label">Source</div>' +
              '<div class="detail-value">NWS</div>' +
            '</div>' +
          '</div>' +
          '<div class="source">weather.gov</div>' +
        '</div>';
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML =
        '<div class="error-msg">' + escHtml(msg) + '</div>';
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function handleGetWeather(invocationId, params) {
      var data = params._weatherData;

      if (!data) {
        renderError(params._weatherError || 'No weather data received.');
        sendMsg('TOOL_RESULT', {
          invocationId: invocationId,
          error: params._weatherError || 'Failed to fetch weather data'
        });
        return;
      }

      renderWeather(data);

      sendMsg('TOOL_RESULT', {
        invocationId: invocationId,
        result: {
          city: data.city,
          country: data.country,
          temp: data.temp,
          temp_unit: data.temp_unit,
          description: data.description,
          wind_speed: data.wind_speed,
          wind_direction: data.wind_direction,
          condition: data.description,
          message: data.period + ' in ' + data.city + ': ' + data.temp + '°' + data.temp_unit + ', ' + data.description + '.'
        }
      });

      sendMsg('PLUGIN_COMPLETE', {
        summary: data.period + ' in ' + data.city + ': ' + data.temp + '°' + data.temp_unit + ', ' + data.description +
          '. Wind: ' + data.wind_speed + ' ' + data.wind_direction + '.'
      });
    }

    window.addEventListener('message', function(event) {
      var msg = event.data;
      if (!msg || typeof msg !== 'object' || !msg.type) return;
      if (msg.type !== 'TOOL_INVOKE') return;

      if (msg.pluginId) pluginId = msg.pluginId;
      if (msg.conversationId) conversationId = msg.conversationId;

      if (msg.payload.toolName === 'get_weather') {
        handleGetWeather(msg.payload.invocationId, msg.payload.params);
      } else {
        sendMsg('TOOL_RESULT', {
          invocationId: msg.payload.invocationId,
          error: 'Unknown tool: ' + msg.payload.toolName
        });
      }
    });

    var urlParams = new URLSearchParams(window.location.search);
    pluginId = urlParams.get('pluginId') || 'weather';
    conversationId = urlParams.get('conversationId') || 'unknown';

    sendMsg('PLUGIN_READY', {});
  </script>
</body>
</html>
